services:
  app:
    build: .
    ports:
    - "9092:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - CI_ENVIRONMENT=development
    depends_on:
      - tailwind

  tailwind:
    build: .
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    working_dir: /var/www/html
    command: npm run dev
